name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24, 26]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:backend
      - run: npm run dashboard:test
      - run: npm run plugin-sdk:check
      - run: npm run plugin-sdk:api:check
      - run: npm run test:coverage
      - run: npm run check-phase-09-parity
      - run: npm run workspace:validate

  publish:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Validate version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Version mismatch: tag v$TAG_VERSION !== package.json $PKG_VERSION"
            exit 1
          fi
          echo "Version $TAG_VERSION validated"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
